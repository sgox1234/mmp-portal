<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MMP - Mobility Management Portal</title>
  <style>
    :root {
      --navy: #061b3e;
      --navy-dark: #031633;
      --blue: #0a5bd8;
      --light-blue: #eef7ff;
      --sky: #dff1ff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #d9dee8;
      --bg: #f5f7fb;
      --green: #16a34a;
      --red: #dc2626;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", "Meiryo", sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    header {
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 30px;
      background: var(--navy);
      color: white;
    }

    .brand {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }

    .brand-main {
      font-size: 30px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .brand-sub {
      font-size: 15px;
      font-weight: 500;
    }

    .powered {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 13px;
      color: rgba(255,255,255,0.9);
    }

    .orix-logo {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    .orix-mark {
      width: 33px;
      height: 18px;
      background: #e60012;
      transform: skewX(-14deg);
      border-radius: 2px;
      display: inline-block;
    }

    .screen {
      display: none;
      min-height: calc(100vh - 68px);
    }

    .screen.active {
      display: block;
    }

    .admin-bg {
      background: var(--navy-dark);
      color: white;
    }

    .customer-bg {
      background: linear-gradient(135deg, #f7fbff 0%, #ffffff 45%, #e8f5ff 100%);
    }

    .admin-login-layout {
      min-height: calc(100vh - 68px);
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
    }

    .admin-hero {
      padding: 80px 70px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .admin-hero .eyebrow {
      color: #bcd7ff;
      font-size: 14px;
      margin-bottom: 18px;
    }

    .admin-hero h1 {
      font-size: 52px;
      line-height: 1.08;
      margin: 0 0 22px;
      letter-spacing: -1px;
    }

    .admin-hero p {
      font-size: 18px;
      color: #dbeafe;
      margin: 0 0 28px;
    }

    .security-note {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: #bfdbfe;
      font-size: 14px;
    }
